<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Note card subtle shadow layer -->
  <rect x="16" y="13" width="48" height="60" rx="6" fill="white" opacity="0.15"/>
  <!-- Note card -->
  <rect x="14" y="11" width="48" height="60" rx="6" fill="white"/>

  <!-- Text lines on note -->
  <rect x="22" y="24" width="32" height="4"   rx="2"    fill="#4f46e5"/>
  <rect x="22" y="33" width="26" height="3.5" rx="1.75" fill="#6366f1" opacity="0.7"/>
  <rect x="22" y="41" width="21" height="3.5" rx="1.75" fill="#6366f1" opacity="0.5"/>
  <rect x="22" y="49" width="16" height="3.5" rx="1.75" fill="#6366f1" opacity="0.35"/>

  <!-- AI sparkle — 4-pointed star, overlapping bottom-right of card -->
  <path d="M70,58 L73.5,66.5 L82,70 L73.5,73.5 L70,82 L66.5,73.5 L58,70 L66.5,66.5 Z"
        fill="white"/>

  <!-- Accent micro-dots -->
  <circle cx="61" cy="60" r="2.2" fill="white" opacity="0.6"/>
  <circle cx="80" cy="81" r="1.7" fill="white" opacity="0.45"/>
</svg>
